<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Materiais - Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
display: none; /* Escondido por padrão até o login ser feito */
}

h1{
text-align:center;
margin-bottom:20px;
color:#003366;
}

.card{
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
}

input,
select,
button{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#003366;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0055aa;
}

button:disabled {
background: #cccccc;
color: #666666;
cursor: not-allowed;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#003366;
color:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.entrada{
color:green;
font-weight:bold;
}

.saida{
color:red;
font-weight:bold;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
text-align:center;
}

.box h2{
color:#003366;
font-size:32px;
margin-bottom:10px;
}

.relatorio-btn{
background:#0a7d32;
}

.relatorio-btn:hover{
background:#0d9c3f;
}

.btn-acoes-historico {
display: flex;
gap: 10px;
margin-bottom: 20px;
}

.undo-btn {
background: #e67e22;
}
.undo-btn:hover {
background: #d35400;
}

.redo-btn {
background: #2980b9;
}
.redo-btn:hover {
background: #3498db;
}

.btn-excluir-tabela {
background: #c0392b;
padding: 5px 10px;
font-size: 13px;
}
.btn-excluir-tabela:hover {
background: #e74c3c;
}

/* --- ESTILOS DA TELA DE LOGIN --- */
.login-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: #002244;
display: flex;
justify-content: center;
align-items: center;
z-index: 9999;
}

.login-card {
background: white;
padding: 30px;
border-radius: 12px;
box-shadow: 0 4px 20px rgba(0,0,0,0.3);
width: 100%;
max-width: 400px;
text-align: center;
}

.login-card h2 {
color: #003366;
margin-bottom: 20px;
}

.login-card input {
margin-bottom: 15px;
}

.login-card .btn-grupo {
display: flex;
gap: 10px;
margin-top: 10px;
}

.login-card .btn-registro {
background: #555;
}
.login-card .btn-registro:hover {
background: #777;
}

.header-app {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
background: white;
padding: 15px;
border-radius: 10px;
box-shadow: 0 2px 8px rgba(0,0,0,.1);
}

.btn-logout {
background: #c0392b;
width: auto;
padding: 8px 15px;
}
.btn-logout:hover {
background: #e74c3c;
}
</style>
</head>

<body>

<div id="loginContainer" class="login-overlay">
    <div class="login-card">
        <h2>🔒 Acesso ao Sistema</h2>
        <input type="email" id="loginEmail" placeholder="E-mail">
        <input type="password" id="loginSenha" placeholder="Senha">
        
        <div class="btn-grupo">
            <button onclick="fazerLogin()">Entrar</button>
            <button onclick="cadastrarUsuario()" class="btn-registro">Cadastrar</button>
        </div>
    </div>
</div>

<div id="appContainer" class="container">

<div class="header-app">
    <h2>📦 Controle de Materiais</h2>
    <div>
        <span id="usuarioLogadoEmail" style="margin-right: 15px; font-weight: bold; color: #555;"></span>
        <button onclick="fazerLogout()" class="btn-logout">Sair 🚪</button>
    </div>
</div>

<div class="btn-acoes-historico">
    <button id="btnUndo" class="undo-btn" onclick="desfazer()">↩️ Desfazer Última Ação</button>
    <button id="btnRedo" class="redo-btn" onclick="refazer()">↪️ Refazer Ação</button>
</div>

<div class="dashboard">

<div class="box">
<h2 id="totalMateriais">0</h2>
<p>Materiais Cadastrados</p>
</div>

<div class="box">
<h2 id="totalEstoque">0</h2>
<p>Total em Estoque</p>
</div>

</div>

<div class="card">

<h3>Cadastrar Material</h3>

<br>

<div class="grid">

<input
type="text"
id="nomeMaterial"
placeholder="Nome do Material">

<select id="categoria">
<option>Elétrico</option>
<option>Limpeza Urbana</option>
</select>

<input
type="number"
id="quantidadeInicial"
placeholder="Quantidade Inicial">

<button onclick="cadastrarMaterial()">
Cadastrar Material
</button>

</div>

</div>

<div class="card">

<h3>Movimentação de Estoque</h3>

<br>

<div class="grid">

<select id="materialMov">

</select>

<select id="tipoMov">

<option value="entrada">
Entrada
</option>

<option value="saida">
Saída
</option>

</select>

<input
type="number"
id="qtdMov"
placeholder="Quantidade">

<input
type="text"
id="responsavelMov"
placeholder="Nome de quem retirou">

<input
type="text"
id="destinoMov"
placeholder="Destino do material">

<button onclick="registrarMovimentacao()">
Registrar Movimentação
</button>

</div>

</div>

<div class="card">

<h3>Estoque Atual</h3>

<br>

<table>

<thead>

<tr>
<th>Material</th>
<th>Categoria</th>
<th>Quantidade</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabelaMateriais">

</tbody>

</table>

</div>

<div class="card">

<h3>Histórico de Movimentações</h3>

<br>

<table>

<thead>

<tr>
<th>Data</th>
<th>Material</th>
<th>Tipo</th>
<th>Quantidade</th>
<th>Responsável</th>
<th>Destino</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="historico">

</tbody>

</table>

</div>

<div class="card">

<button
class="relatorio-btn"
onclick="gerarRelatorio()">

📄 Gerar Relatório

</button>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// Configurações do seu Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCD5od0xV5JD4Odo7rSd571l2rm73mO8q4",
  authDomain: "gerenciador-cd853.firebaseapp.com",
  projectId: "gerenciador-cd853",
  storageBucket: "gerenciador-cd853.firebasestorage.app",
  messagingSenderId: "42009235717",
  appId: "1:42009235717:web:91f4119a5491ba9b91676c"
};

// Inicializando Firebase, Firestore e Auth
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const docRef = doc(db, "appData", "controleMateriais");

// Escopo global para manter as variáveis e funções acessíveis pelos botões
window.materiais = [];
window.historico = [];
window.pilhaUndo = [];
window.pilhaRedo = [];

// --- FUNÇÕES DE AUTENTICAÇÃO ---

window.fazerLogin = function() {
    const email = document.getElementById("loginEmail").value.trim();
    const senha = document.getElementById("loginSenha").value;

    if (!email || !senha) {
        alert("Preencha todos os campos de login.");
        return;
    }

    signInWithEmailAndPassword(auth, email, senha)
        .then(() => {
            alert("Login realizado com sucesso! Carregando dados...");
        })
        .catch(error => {
            console.error("Erro de Login:", error);
            alert("Erro ao entrar: " + error.message);
        });
};

window.cadastrarUsuario = function() {
    const email = document.getElementById("loginEmail").value.trim();
    const senha = document.getElementById("loginSenha").value;

    if (!email || !senha) {
        alert("Preencha todos os campos para cadastrar.");
        return;
    }
    if (senha.length < 6) {
        alert("A senha deve ter pelo menos 6 caracteres.");
        return;
    }

    createUserWithEmailAndPassword(auth, email, senha)
        .then(() => {
            alert("Usuário cadastrado e conectado com sucesso!");
        })
        .catch(error => {
            console.error("Erro de Cadastro:", error);
            alert("Erro ao cadastrar: " + error.message);
        });
};

window.fazerLogout = function() {
    signOut(auth).then(() => {
        document.getElementById("loginEmail").value = "";
        document.getElementById("loginSenha").value = "";
    });
};

// Monitoramento do Estado de Login em tempo real
let unsubscribeFirestore = null;

onAuthStateChanged(auth, (user) => {
    const loginContainer = document.getElementById("loginContainer");
    const appContainer = document.getElementById("appContainer");
    const usuarioLogadoEmail = document.getElementById("usuarioLogadoEmail");

    if (user) {
        // Usuário logado: Mostra o app e esconde a tela de login
        loginContainer.style.display = "none";
        appContainer.style.display = "block";
        usuarioLogadoEmail.innerText = `Usuário: ${user.email}`;

        // Inicia a escuta em tempo real do banco de dados
        unsubscribeFirestore = onSnapshot(docRef, (snapshot) => {
            if (snapshot.exists()) {
                const dados = snapshot.data();
                window.materiais = dados.materiais || [];
                window.historico = dados.historico || [];
            } else {
                // CORREÇÃO CRÍTICA: Se o documento não existir no banco ainda, inicializa zerado na tela
                window.materiais = [];
                window.historico = [];
            }
            atualizarTela();
        }, (error) => {
            console.error("Erro de Permissão ou Leitura no Firestore:", error);
            alert("Atenção: Erro ao carregar os dados do banco. Verifique se as Regras do Firestore estão públicas.");
        });

    } else {
        // Usuário deslogado: Mostra a tela de login e esconde o app
        loginContainer.style.display = "flex";
        appContainer.style.display = "none";
        
        if (unsubscribeFirestore) {
            unsubscribeFirestore();
            unsubscribeFirestore = null;
        }
    }
});


// --- LÓGICA ORIGINAL DO APLICATIVO ---

async function salvar(){
    try {
        await setDoc(docRef, {
            materiais: window.materiais,
            historico: window.historico
        });
    } catch (e) {
        console.error("Erro crítico ao salvar no Firebase: ", e);
        alert("Erro ao salvar dados. Verifique suas regras do banco.");
    }
}

function salvarEstadoHistorico() {
    window.pilhaUndo.push({
        materiais: JSON.parse(JSON.stringify(window.materiais)),
        historico: JSON.parse(JSON.stringify(window.historico))
    });
    window.pilhaRedo = [];
}

function atualizarBotoesUndoRedo() {
    document.getElementById("btnUndo").disabled = window.pilhaUndo.length === 0;
    document.getElementById("btnRedo").disabled = window.pilhaRedo.length === 0;
}

window.desfazer = function() {
    if (window.pilhaUndo.length === 0) return;

    window.pilhaRedo.push({
        materiais: JSON.parse(JSON.stringify(window.materiais)),
        historico: JSON.parse(JSON.stringify(window.historico))
    });

    let estadoAnterior = window.pilhaUndo.pop();
    window.materiais = estadoAnterior.materiais;
    window.historico = estadoAnterior.historico;

    salvar();
    atualizarTela();
}

window.refazer = function() {
    if (window.pilhaRedo.length === 0) return;

    window.pilhaUndo.push({
        materiais: JSON.parse(JSON.stringify(window.materiais)),
        historico: JSON.parse(JSON.stringify(window.historico))
    });

    let proximoEstado = window.pilhaRedo.pop();
    window.materiais = proximoEstado.materiais;
    window.historico = proximoEstado.historico;

    salvar();
    atualizarTela();
}

function atualizarTela(){
    let tabela = document.getElementById("tabelaMateriais");
    tabela.innerHTML = "";

    let select = document.getElementById("materialMov");
    select.innerHTML = "";

    let estoqueTotal = 0;

    window.materiais.forEach((m, index) => {
        estoqueTotal += Number(m.quantidade);

        tabela.innerHTML += `
        <tr>
            <td>${m.nome}</td>
            <td>${m.categoria}</td>
            <td>${m.quantidade}</td>
            <td>
                <button class="btn-excluir-tabela" onclick="excluirMaterial(${index})">Excluir</button>
            </td>
        </tr>`;

        select.innerHTML += `
        <option value="${index}">
            ${m.nome}
        </option>`;
    });

    document.getElementById("totalMateriais").innerText = window.materiais.length;
    document.getElementById("totalEstoque").innerText = estoqueTotal;

    let hist = document.getElementById("historico");
    hist.innerHTML = "";

    let historicoMapeado = window.historico.map((h, index) => ({ ...h, indexReal: index }));
    
    historicoMapeado.reverse().forEach(h => {
        hist.innerHTML += `
        <tr>
            <td>${h.data}</td>
            <td>${h.material}</td>
            <td class="${h.tipo}">${h.tipo.toUpperCase()}</td>
            <td>${h.quantidade}</td>
            <td>${h.responsavel || "-"}</td>
            <td>${h.destino || "-"}</td>
            <td>
                <button class="btn-excluir-tabela" onclick="apagarItemHistorico(${h.indexReal})">Apagar</button>
            </td>
        </tr>`;
    });

    atualizarBotoesUndoRedo();
}

window.cadastrarMaterial = function(){
    let nome = document.getElementById("nomeMaterial").value.trim();
    let categoria = document.getElementById("categoria").value;
    let qtd = Number(document.getElementById("quantidadeInicial").value);

    if(nome === ""){
        alert("Digite o nome do material.");
        return;
    }

    if(isNaN(qtd) || qtd < 0){
        alert("Quantidade inválida.");
        return;
    }

    salvarEstadoHistorico();

    window.materiais.push({
        nome: nome,
        categoria: categoria,
        quantidade: qtd
    });

    salvar();
    atualizarTela();

    document.getElementById("nomeMaterial").value = "";
    document.getElementById("quantidadeInicial").value = "";

    alert("Material cadastrado com sucesso!");
}

window.registrarMovimentacao = function(){
    if(window.materiais.length === 0){
        alert("Cadastre um material primeiro.");
        return;
    }

    let indice = document.getElementById("materialMov").value;
    let tipo = document.getElementById("tipoMov").value;
    let qtd = Number(document.getElementById("qtdMov").value);
    let responsavel = document.getElementById("responsavelMov").value.trim();
    let destino = document.getElementById("destinoMov").value.trim();

    if(isNaN(qtd) || qtd <= 0){
        alert("Quantidade inválida.");
        return;
    }

    if(tipo === "saida"){
        if(responsavel === ""){
            alert("Informe o responsável pela retirada.");
            return;
        }

        if(destino === ""){
            alert("Informe o destino do material.");
            return;
        }

        if(window.materiais[indice].quantidade < qtd){
            alert("Estoque insuficiente.");
            return;
        }

        salvarEstadoHistorico();
        window.materiais[indice].quantidade -= qtd;
    } else {
        salvarEstadoHistorico();
        window.materiais[indice].quantidade += qtd;
    }

    window.historico.push({
        data: new Date().toLocaleString("pt-BR"),
        material: window.materiais[indice].nome,
        tipo: tipo,
        quantidade: qtd,
        responsavel: responsavel || "-",
        destino: destino || "-"
    });

    salvar();
    atualizarTela();

    document.getElementById("qtdMov").value = "";
    document.getElementById("responsavelMov").value = "";
    document.getElementById("destinoMov").value = "";

    alert("Movimentação registrada com sucesso!");
}

window.excluirMaterial = function(index){
    if(confirm("Deseja realmente excluir este material?")){
        salvarEstadoHistorico();
        window.materiais.splice(index, 1);
        salvar();
        atualizarTela();
        alert("Material excluído com sucesso.");
    }
}

window.apagarItemHistorico = function(indexReal) {
    if(confirm("Deseja realmente apagar este registro do histórico?")){
        salvarEstadoHistorico();
        window.historico.splice(indexReal, 1);
        salvar();
        atualizarTela();
        alert("Registro do histórico removido com sucesso.");
    }
}

window.gerarRelatorio = function(){
    let janela = window.open("", "_blank");
    let estoqueHTML = "";

    let listaMateriais = window.materiais || [];
    listaMateriais.forEach(m => {
        estoqueHTML += `
        <tr>
            <td>${m.nome}</td>
            <td>${m.categoria}</td>
            <td>${m.quantidade}</td>
        </tr>`;
    });

    let historicoHTML = "";

    window.historico.forEach(h => {
        historicoHTML += `
        <tr>
            <td>${h.data}</td>
            <td>${h.material}</td>
            <td>${h.tipo}</td>
            <td>${h.quantidade}</td>
            <td>${h.responsavel || "-"}</td>
            <td>${h.destino || "-"}</td>
        </tr>`;
    });

    janela.document.write(`
    <html>
    <head>
    <title>Relatório de Materiais</title>
    <style>
    body{ font-family:Arial; padding:20px; }
    h1,h2{ color:#003366; }
    table{ width:100%; border-collapse:collapse; margin-top:10px; margin-bottom:20px; }
    th,td{ border:1px solid #ccc; padding:8px; text-align:center; }
    th{ background:#003366; color:white; }
    .info{ margin-bottom:20px; font-size:16px; }
    </style>
    </head>
    <body>
    <h1>Relatório de Controle de Materiais</h1>
    <div class="info">
    <strong>Data:</strong> ${new Date().toLocaleString("pt-BR")}
    </div>
    <h2>Resumo Geral</h2>
    <p><b>Total de Materiais:</b> ${window.materiais.length}</p>
    <p><b>Total em Estoque:</b> ${window.materiais.reduce((t,m) => t + Number(m.quantidade), 0)}</p>
    <h2>Estoque Atual</h2>
    <table>
    <tr><th>Material</th><th>Categoria</th><th>Quantidade</th></tr>
    ${estoqueHTML}
    </table>
    <h2>Histórico de Movimentações</h2>
    <table>
    <tr><th>Data</th><th>Material</th><th>Tipo</th><th>Quantidade</th><th>Responsável</th><th>Destino</th></tr>
    ${historicoHTML}
    </table>
    <script>window.print();<\/script>
    </body>
    </html>`);

    janela.document.close();
}
</script>

</body>
</html>
